<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحويل... | مصنع القومية</title>
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alqwmya.com/">
    <meta property="og:title" content="مصنع القومية للصناعات الأسمنتية">
    <meta property="og:description" content="جودة، دقة، والتزام في التوريد لكافة المشاريع الأسمنتية.">
    <meta property="og:image" content="https://alqwmya.com/images/logo.png">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e67e22;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #64748b; }
        a { color: #e67e22; text-decoration: none; font-weight: bold; }
    </style>
    <script>
        // Configuration
        const config = {
            customDomain: 'alqwmya.com',
            ghRepoPath: '/-/',
            mappings: {
                'hussein': 'eng-hussein-abdelshafy',
                'ali': 'eng-ali-abdelshafy'
            }
        };

        function getRedirectUrl() {
            let hostname = window.location.hostname;
            let path = window.location.pathname;
            let search = window.location.search;
            let hash = window.location.hash;

            // 1. Fix Path Mappings
            for (const [oldPath, newPath] of Object.entries(config.mappings)) {
                const regex = new RegExp(`(^|/)${oldPath}(/|$)`, 'i');
                if (regex.test(path)) {
                    path = path.replace(regex, `$1${newPath}$2`);
                    break;
                }
            }

            // 2. Determine Base URL
            let baseUrl;
            if (hostname.includes('github.io')) {
                // Remove repo name from path (e.g., /-/hussein/ -> /hussein/)
                if (path.startsWith(config.ghRepoPath)) {
                    path = path.substring(config.ghRepoPath.length - 1);
                }
                baseUrl = `https://${config.customDomain}`;
            } else {
                baseUrl = `https://${hostname}`;
            }

            return baseUrl + path + search + hash;
        }

        const finalUrl = getRedirectUrl();
        window.location.replace(finalUrl);
    </script>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h1>جاري تحويلك للموقع الجديد</h1>
        <p>إذا لم يتم تحويلك تلقائياً، <a id="manual-link" href="#">اضغط هنا</a></p>
    </div>
    <script>
        document.getElementById('manual-link').href = finalUrl;
        // Fallback redirect
        setTimeout(() => { window.location.replace(finalUrl); }, 2000);
    </script>
</body>
</html>
